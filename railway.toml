# This root railway.toml is not used when deploying separate services
# Each service (backend/frontend) has its own railway.json config
# See RAILWAY_DEPLOYMENT.md for deployment instructions

[build]
builder = "nixpacks"
buildCommand = "npm install && npm run prisma:generate && npm run build:production"

[deploy]
startCommand = "cd backend && npx prisma migrate resolve --rolled-back 20260212151125_add_esim_order_statuses && npx prisma migrate deploy && npm run start"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
