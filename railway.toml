# This root railway.toml is not used when deploying separate services
# Each service (backend/frontend) has its own railway.json config
# See RAILWAY_DEPLOYMENT.md for deployment instructions

[build]
builder = "nixpacks"
buildCommand = "npm install && npm run build:production"

[deploy]
startCommand = "cd backend && npm run start"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
